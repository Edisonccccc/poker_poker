<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1ecfe"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#3b0a73" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- rounded purple tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <circle cx="150" cy="140" r="200" fill="#ffffff" opacity="0.08"/>

  <!-- back card, peeking behind -->
  <g transform="rotate(-18 256 270)" filter="url(#shadow)">
    <rect x="150" y="120" width="190" height="262" rx="28" fill="#ddd6fe"/>
  </g>

  <!-- front card: Ace of Spades -->
  <g transform="rotate(9 256 280)" filter="url(#shadow)">
    <rect x="170" y="140" width="196" height="266" rx="28" fill="url(#card)"/>
    <!-- top-left corner -->
    <text x="192" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#5b21b6">A</text>
    <path d="M205 198c-13 11-20 18-20 29a12 12 0 0 0 23 2 12 12 0 0 0 23-2c0-11-7-18-20-29-2-2-4-2-6 0z" fill="#5b21b6"/>
    <!-- big center spade -->
    <path d="M268 218c-40 33-62 55-62 88a36 36 0 0 0 71 5 36 36 0 0 0 71-5c0-33-22-55-62-88-6-5-12-5-18 0z" fill="#7c3aed"/>
    <rect x="259" y="300" width="18" height="44" rx="6" fill="#7c3aed"/>
    <!-- bottom-right corner (rotated) -->
    <g transform="rotate(180 332 360)">
      <text x="318" y="372" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#5b21b6">A</text>
    </g>
  </g>

  <!-- poker chip accent -->
  <g transform="translate(372 372)">
    <circle r="56" fill="#fbbf24"/>
    <circle r="56" fill="none" stroke="#b45309" stroke-width="6" stroke-dasharray="17 13"/>
    <circle r="33" fill="none" stroke="#b45309" stroke-width="6"/>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#7c3aed">♠</text>
  </g>
</svg>
